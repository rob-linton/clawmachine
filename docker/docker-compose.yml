services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${CLAW_REDIS_PORT:-6399}:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy noeviction
      --requirepass ${CLAW_REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${CLAW_REDIS_PASSWORD:-changeme}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      target: api
    restart: unless-stopped
    # No ports exposed — Caddy fronts this service
    environment:
      CLAW_REDIS_URL: "redis://:${CLAW_REDIS_PASSWORD:-changeme}@redis:6379/${CLAW_REDIS_DB:-0}"
      CLAW_API_PORT: "8080"
      CLAW_STATIC_DIR: /app/static
      CLAW_API_TOKEN: "${CLAW_API_TOKEN:-}"
      CLAW_ADMIN_USER: "${CLAW_ADMIN_USER:-admin}"
      CLAW_ADMIN_PASSWORD: "${CLAW_ADMIN_PASSWORD}"
      CLAW_CORS_ORIGIN: "https://${CLAW_HOST_IP:-localhost}"
      RUST_LOG: "${RUST_LOG:-info,claw_api=debug}"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CLAW_DATA_DIR:-~/.claw-data}:/home/claw/.claw
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    environment:
      CLAW_REDIS_URL: "redis://:${CLAW_REDIS_PASSWORD:-changeme}@redis:6379/${CLAW_REDIS_DB:-0}"
      CLAW_WORKER_CONCURRENCY: "${CLAW_WORKER_CONCURRENCY:-2}"
      CLAW_EXECUTION_BACKEND: "${CLAW_EXECUTION_BACKEND:-local}"
      RUST_LOG: "${RUST_LOG:-info,claw_worker=debug}"
      HOME: /home/claw
      # Docker-in-Docker: host path for volume mounts into sandbox containers
      CLAW_HOST_DATA_DIR: "${CLAW_DATA_DIR:-~/.claw-data}"
      CLAW_HOST_CLAUDE_HOME: "${CLAUDE_HOME:-~/.claude}"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${CLAUDE_HOME:-~/.claude}:/home/claw/.claude
      - ${CLAUDE_JSON:-~/.claude.json}:/home/claw/.claude.json:ro
      - ${CLAW_DATA_DIR:-~/.claw-data}:/home/claw/.claw
    deploy:
      replicas: ${CLAW_WORKER_REPLICAS:-1}

  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      target: scheduler
    restart: unless-stopped
    environment:
      CLAW_REDIS_URL: "redis://:${CLAW_REDIS_PASSWORD:-changeme}@redis:6379/${CLAW_REDIS_DB:-0}"
      CLAW_JOBS_WATCH_DIR: /app/jobs
      CLAW_CRON_CHECK_INTERVAL_SECS: "${CLAW_CRON_INTERVAL:-30}"
      RUST_LOG: "${RUST_LOG:-info,claw_scheduler=debug}"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../jobs:/app/jobs

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      CLAW_HOST_IP: "${CLAW_HOST_IP:-localhost}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_healthy

volumes:
  redis_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
