services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${CLAW_REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      target: api
    restart: unless-stopped
    ports:
      - "${CLAW_API_PORT:-8080}:8080"
    environment:
      CLAW_REDIS_URL: "redis://redis:6379/${CLAW_REDIS_DB:-0}"
      CLAW_API_PORT: "8080"
      CLAW_STATIC_DIR: /app/static
      RUST_LOG: "${RUST_LOG:-info,claw_api=debug}"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      target: worker
    restart: unless-stopped
    environment:
      CLAW_REDIS_URL: "redis://redis:6379/${CLAW_REDIS_DB:-0}"
      CLAW_WORKER_CONCURRENCY: "${CLAW_WORKER_CONCURRENCY:-2}"
      RUST_LOG: "${RUST_LOG:-info,claw_worker=debug}"
      HOME: /home/claw
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../output:/app/output
      - ../skills:/app/skills
      - ../workspaces:/app/workspaces
      - ${HOME}/.claude:/home/claw/.claude:ro
    deploy:
      replicas: ${CLAW_WORKER_REPLICAS:-1}

  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
      target: scheduler
    restart: unless-stopped
    environment:
      CLAW_REDIS_URL: "redis://redis:6379/${CLAW_REDIS_DB:-0}"
      CLAW_JOBS_WATCH_DIR: /app/jobs
      CLAW_CRON_CHECK_INTERVAL_SECS: "${CLAW_CRON_INTERVAL:-30}"
      RUST_LOG: "${RUST_LOG:-info,claw_scheduler=debug}"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ../jobs:/app/jobs

volumes:
  redis_data:
    driver: local
